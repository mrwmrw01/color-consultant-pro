version: '3.8'
services:
  postgres:
    image: postgres:14-alpine
    container_name: color-consultant-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: colorapp
      POSTGRES_PASSWORD: colorpass123
      POSTGRES_DB: color_consultant_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U colorapp -d color_consultant_dev"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
